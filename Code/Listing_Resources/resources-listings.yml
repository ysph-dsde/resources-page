# =============================================================================
# Yale School of Public Health (YSPH)
# Resource Navigation Tool — Resources Page (github.io)
# YAML listing documentation
# =============================================================================
# 
# Overview
# --------
# This file defines the YAML listing that populates the Datasets page. Content
# is rendered by an EJS template into a filterable/sortable grid of “tiles”.
# 
# Filter by two categories: 
#   1. Region and/or affiliation 
#   2. Services
#
# Author / Maintenance
# --------------------
# Author: Shelby Golden, M.S.
#   Date: May 10th, 2025
# 
# Date last updated: Jan. 20th, 2026
#   Last updated by: Shelby Golden
# 
# Taxonomy (Filters)
# ------------------
# The UI supports two filter groups:
#   1) Region and/or affiliation
#   2) Services offered
#
# UI behavior (EJS template integration)
# -------------------------------------
# Filtering:
#   - Filters apply across all two groups.
#   - Within a group: matching is “OR” across selected checkboxes.
#   - Across groups: matching is “AND” (tile must satisfy each active group).
#
# Sorting:
#   - User-selectable sorting by:
#       * title
#       * date-updated
#   - Default sorting (“No sorting” option):
#       * ranking (ascending), then title (A–Z)
#
# Adding new tiles
# ---------------
# Structure:
#   - Under `items`, each entry groups tiles that share the same two categories.
#   - Grouping rule:
#       * Put tiles with the SAME (Region and/or affiliation, Services offered) 
#         together under the same `tiles:` list.
#       * Result: those tiles will filter together when users select any
#         combination of the two category groups.
#
# Required tile fields (under `tiles: - title: ...`)
# --------------------------------------------------
#   - title
#   - description
#   - date-added
#   - date-updated
#   - ranking
#   - image
#   - topic (used to display the services offered on the tile)
# 
# Optional tile fields
# --------------------
#   - site: main source webpage
#   - group: lab/group webpage providing the resource
#   - github: code repository
#   - article: primary publication(s) describing the resource
#   - info: internal page with additional details
#
# Editing existing tiles
# ----------------------
#   - Verify any new/changed links work as expected.
#   - Update the tile’s `date-updated`.
#   - Update the “Last updated” metadata in the header comments above.
# =============================================================================

  
